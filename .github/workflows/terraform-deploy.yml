name: 'Terraform Deploy'

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging
          - prod

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_environment: ${{ github.event.inputs.environment || 'test' }}

jobs:
  terraform-deploy:
    name: 'Terraform Deploy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: "1.5.0"

    - name: Configure Azure Credentials
      uses: azure/login@v1
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Terraform Format
      id: fmt
      run: terraform fmt -check
      continue-on-error: true

    - name: Terraform Init
      id: init
      run: |
        # Initialize Terraform
        terraform init
        
        # Initialize each module
        for module in modules/*; do
          if [ -d "$module" ]; then
            echo "Initializing module: $module"
            cd $module
            terraform init
            cd ../..
          fi
        done

    - name: Terraform Validate
      id: validate
      run: |
        # Validate root configuration
        terraform validate
        
        # Validate each module
        for module in modules/*; do
          if [ -d "$module" ]; then
            echo "Validating module: $module"
            cd $module
            terraform validate
            cd ../..
          fi
        done

    - name: Terraform Plan
      id: plan
      run: |
        # Create plan file
        terraform plan -no-color -var="environment=${{ env.TF_VAR_environment }}" -out=tfplan
        
        # Show plan in JSON format
        terraform show -json tfplan > tfplan.json

    - name: Check for sensitive data
      id: sensitive
      run: |
        if grep -r "password\|secret\|key" .; then
          echo "Sensitive data found in plan"
          exit 1
        fi
      continue-on-error: true

    - name: Terraform Security Check
      id: security
      run: |
        # Install tfsec
        curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
        
        # Run security check
        tfsec .
      continue-on-error: true

    - name: Check for breaking changes
      id: breaking
      run: |
        # Install terraform-compliance
        pip install terraform-compliance
        
        # Run compliance check
        terraform-compliance -f tests/terraform-compliance -p tfplan
      continue-on-error: true

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: apply
      run: |
        # Apply the plan
        terraform apply -auto-approve tfplan
        
        # Get outputs
        terraform output -json > outputs.json
      env:
        TF_VAR_environment: ${{ env.TF_VAR_environment }}

    - name: Post-deployment Checks
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        # Check AKS cluster status
        if [ -f outputs.json ]; then
          AKS_NAME=$(cat outputs.json | jq -r '.aks_cluster_name.value')
          if [ ! -z "$AKS_NAME" ]; then
            echo "Checking AKS cluster status..."
            az aks show --name $AKS_NAME --resource-group ${{ env.TF_VAR_environment }}-rg --query provisioningState -o tsv
          fi
        fi

    - name: Notify on Success
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          const environment = process.env.TF_VAR_environment;
          const message = `✅ Terraform deployment to ${environment} environment completed successfully!
          
          Deployment Details:
          - Environment: ${environment}
          - Commit: ${context.sha}
          - Branch: ${context.ref}
          - Triggered by: ${context.actor}
          
          Next Steps:
          1. Verify the deployment in Azure Portal
          2. Check application health
          3. Monitor logs for any issues`;
          
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: message
          });

    - name: Notify on Failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const environment = process.env.TF_VAR_environment;
          const message = `❌ Terraform deployment to ${environment} environment failed!
          
          Environment: ${environment}
          Commit: ${context.sha}
          Branch: ${context.ref}
          Triggered by: ${context.actor}
          
          Please check the logs for details and take appropriate action.`;
          
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: message
          });

    - name: Output Deployment Results
      run: |
        echo "Format Check: ${{ steps.fmt.outcome }}"
        echo "Init: ${{ steps.init.outcome }}"
        echo "Validate: ${{ steps.validate.outcome }}"
        echo "Plan: ${{ steps.plan.outcome }}"
        echo "Security Check: ${{ steps.security.outcome }}"
        echo "Breaking Changes: ${{ steps.breaking.outcome }}"
        echo "Apply: ${{ steps.apply.outcome }}" 