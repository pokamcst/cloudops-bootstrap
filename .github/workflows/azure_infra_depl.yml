name: Azure Infrastructure Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'IaC/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'IaC/**'
  workflow_dispatch:

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    # Set environment based on branch, with feature branches using development
    environment: >-
      ${{ 
        github.ref == 'refs/heads/main' && 'production' || 
        (startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/feat/')) && 'development' || 
        'development' 
      }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Terraform Init
        working-directory: ./IaC
        run: |
          # Initialize without backend (can be configured later)
          # To enable remote backend, uncomment backend block in providers.tf
          # and run: terraform init -backend-config=...
          terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./IaC
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./IaC
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ./IaC/tfplan
          retention-days: 5

  terraform-apply:
    name: 'Terraform Apply'
    needs: terraform-plan
    # Only run apply for main/develop branches (not feature branches)
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ./IaC

      - name: Terraform Init
        working-directory: ./IaC
        run: |
          # Initialize without backend (can be configured later)
          # To enable remote backend, uncomment backend block in providers.tf
          # and run: terraform init -backend-config=...
          terraform init -backend=false

      - name: Terraform Apply
        working-directory: ./IaC
        run: terraform apply -auto-approve tfplan