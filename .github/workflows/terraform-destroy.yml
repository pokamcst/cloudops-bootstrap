name: 'Terraform Destroy Infrastructure'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm_destroy:
        description: 'Type "YES" to confirm destruction (case-sensitive)'
        required: true
        type: string

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  confirm-destroy:
    name: 'Confirm Destroy'
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "YES" ]; then
            echo "❌ Destruction cancelled - confirmation text does not match 'YES' (case-sensitive)"
            exit 1
          fi
          echo "✅ Destruction confirmed for ${{ github.event.inputs.environment }} environment"

      - name: Additional Safety Check
        if: github.event.inputs.environment == 'prod'
        run: |
          echo "⚠️  WARNING: Destroying PRODUCTION environment!"
          echo "This action will delete all infrastructure in the prod environment."
          echo "Only repository administrators can trigger this workflow."

  terraform-destroy:
    name: 'Terraform Destroy - ${{ github.event.inputs.environment }}'
    needs: confirm-destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./IaC
    # Only allow from main branch and for specific users
    environment: 
      name: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Terraform Init
        id: init
        run: terraform init -backend=false
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: Terraform Validate
        id: validate
        run: terraform validate
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: Terraform Plan Destroy
        id: plan-destroy
        run: terraform plan -destroy -no-color -var="environment=${{ github.event.inputs.environment }}" -out=destroy_plan
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: Display Destroy Plan
        run: |
          echo "## 🗑️ Resources to be DESTROYED"
          terraform show -no-color destroy_plan | head -100
          echo ""
          echo "**Full plan saved in artifact**"

      - name: Upload Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.event.inputs.environment }}
          path: ./IaC/destroy_plan
          retention-days: 7

      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -auto-approve -no-color -var="environment=${{ github.event.inputs.environment }}"
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: Destruction Complete
        run: |
          echo "✅ Infrastructure destruction completed for ${{ github.event.inputs.environment }}"
          echo ""
          echo "**Resources destroyed:**"
          echo "- Azure Resource Group and all contained resources"
          echo "- Kubernetes Cluster (AKS)"
          echo "- Databases (PostgreSQL, CosmosDB)"
          echo "- Storage Accounts"
          echo "- Key Vault"
          echo "- Application Insights"
          echo "- Log Analytics Workspace"
          echo "- Virtual Networks"
          echo "- Front Door (if configured)"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Destruction failed!"
          echo "Please check the logs above and retry."
          exit 1
