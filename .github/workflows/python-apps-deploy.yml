name: Python App CI/CD

on:
  push:
    branches: [ main, develop, feature/*]
    paths:
      - 'python-app/**'
      - 'python-app/pyproject.toml'
      - 'python-app/requirements.txt'
      - 'python-app/requirements-dev.txt'
      - 'python-app/Dockerfile'
      - 'python-app/app/config.py'
      - 'python-app/.env.example'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'python-app/**'
      - 'python-app/pyproject.toml'
      - 'python-app/requirements.txt'
      - 'python-app/requirements-dev.txt'
      - 'python-app/Dockerfile'
      - 'python-app/app/config.py'
      - 'python-app/.env.example'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: ${{ secrets.PYTHON_WEBAPP_NAME }}

jobs:
  build-and-test:
    name: 'Build and Test Python App'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      working-directory: ./python-app
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      working-directory: ./python-app
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Test with pytest
      working-directory: ./python-app
      run: |
        pytest --cov=. --cov-report=xml
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: ./python-app/coverage.xml
        
    - name: Build Python package
      working-directory: ./python-app
      run: |
        python -m pip install --upgrade build
        python -m build
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: ./python-app/dist/
  
  deploy:
    name: 'Deploy Python App'
    needs: build-and-test
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: python-package
        path: ./python-app/dist/
        
    - name: Azure Login
      uses: azure/login@v1
      with:
        auth-type: OIDC
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      working-directory: ./python-app
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ./python-app
        
    - name: Run post-deployment tests
      working-directory: ./python-app
      run: |
        python -m pip install requests
        python ./tests/post_deployment_check.py ${{ env.AZURE_WEBAPP_NAME }}
      continue-on-error: true
